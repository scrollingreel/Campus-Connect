name: CampusConnect CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Run Backend Tests
        env:
          MONGO_URI: mongodb://localhost:27017/campusconnect_test
          JWT_SECRET: test_jwt_secret_key_2025
          NODE_ENV: test
          PORT: 5000
        run: |
          cd server
          # Start the backend Express server in the background
          node index.js &
          # Give the server and MongoDB container a few seconds to spin up
          sleep 5
          # Execute the 29-assertion integration security suite
          npm test

      - name: Run Frontend Tests
        run: |
          cd client
          # Runs the frontend test script (placeholder check)
          npm test
